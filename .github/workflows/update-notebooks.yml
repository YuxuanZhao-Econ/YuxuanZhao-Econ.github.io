name: Refresh notebooks and deploy Pages

on:
  push:
    branches:
      - main
  schedule:
    # Daily at 10:23 UTC. The off-hour minute reduces scheduler congestion.
    - cron: "23 10 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.decision.outputs.should_deploy }}

    steps:
      - name: Check out website
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-notebooks.txt

      - name: Install notebook renderer
        run: python -m pip install -r requirements-notebooks.txt

      - name: Render selected notebooks
        run: python scripts/render_notebooks.py

      - name: Save refreshed notebook pages
        id: sync
        shell: bash
        run: |
          git add notebooks/

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Refresh notebook pages"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Decide whether to deploy
        id: decision
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "schedule" && "${{ steps.sync.outputs.changed }}" != "true" ]]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure GitHub Pages
        if: steps.decision.outputs.should_deploy == 'true'
        uses: actions/configure-pages@v5

      - name: Prepare site artifact
        if: steps.decision.outputs.should_deploy == 'true'
        shell: bash
        run: |
          mkdir -p _site
          cp index.html styles.css script.js favicon.svg CNAME robots.txt sitemap.xml _site/
          cp -R notebooks research teaching cv _site/
          touch _site/.nojekyll

      - name: Upload GitHub Pages artifact
        if: steps.decision.outputs.should_deploy == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    if: needs.build.outputs.should_deploy == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

